openapi: 3.0.3
info:
  title: 32Bit Garage API
  description: |
    Isparta yerel halkı ve üniversite öğrencileri için geliştirilmiş ikinci el araç ve motosiklet platformu RESTful API tasarımı.
    
    ## Özellikler
    - Kullanıcı Kimlik Doğrulama (Kayıt / Giriş)
    - Araç İlanı Yönetimi
    - Favori İlan İşlemleri
    - Profil Yönetimi
    - JWT tabanlı yetkilendirme
  version: 1.0.0
  contact:
    name: 32Bit Garage Destek Ekibi
    email: api-support@32bitgarage.com
    url: https://api.32bitgarage.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.32bitgarage.com/v1
    description: Production server
  - url: https://staging-api.32bitgarage.com/v1
    description: Staging server
  - url: http://localhost:5000/api
    description: Development server
tags:
  - name: auth
    description: Kimlik doğrulama işlemleri
  - name: ads
    description: Araç ve motosiklet ilanı işlemleri
  - name: favorites
    description: İlan favoriye ekleme/çıkarma işlemleri
  - name: users
    description: Kullanıcı profili işlemleri
paths:
  /auth/register:
    post:
      tags:
        - auth
      summary: 1. Üye Olma İşlemi
      description: Sisteme yeni bir kullanıcı kaydeder.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
            examples:
              example1:
                summary: Örnek öğrenci kaydı
                value:
                  email: ogrenci@sdu.edu.tr
                  password: GuvenliSifre32!
                  firstName: Mehmet
                  lastName: Yılmaz
                  phone: "+905551234567"
      responses:
        '201':
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email adresi zaten kullanımda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - auth
      summary: 2. Giriş Yapma İşlemi
      description: Email ve şifre ile giriş yapar, oturum için JWT token döner.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ads:
    get:
      tags:
        - ads
      summary: 4. Araç İlanlarını Listeleme
      description: Sistemdeki tüm aktif araç ve motosiklet ilanlarını listeler (sayfalama ve mahalle filtresi ile).
      operationId: listAds
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: mahalle
          in: query
          description: Isparta içi mahalle filtresi
          schema:
            type: string
            example: "Çünür"
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdList'
                
    post:
      tags:
        - ads
      summary: 3. Yeni Araç/Motosiklet İlanı Verme İşlemi
      description: Sisteme yeni bir taşıt ilanı ekler.
      operationId: createAd
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdCreate'
            examples:
              example1:
                summary: Örnek Motosiklet İlanı
                value:
                  title: "Sahibinden Temiz Yamaha MT-07"
                  description: "2020 model, kazasız, tüm bakımları serviste yapıldı. SDU öğrencisinden satılık."
                  price: 245000.00
                  mahalle: "Çünür"
      responses:
        '201':
          description: İlan başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ads/{adId}:
    put:
      tags:
        - ads
      summary: 5. İlan Bilgilerini Güncelleme
      description: İlanın başlık, fiyat ve açıklama gibi bilgilerini günceller.
      operationId: updateAd
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AdIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdUpdate'
      responses:
        '200':
          description: İlan başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - ads
      summary: 6. Araç İlanını Sistemden Silme
      description: Kullanıcının kendi ilanını sistemden kalıcı olarak silmesini sağlar.
      operationId: deleteAd
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AdIdParam'
      responses:
        '204':
          description: İlan başarıyla silindi
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /favorites:
    post:
      tags:
        - favorites
      summary: 7. İlanı Favorilere Ekleme
      description: Belirli bir ilanı kullanıcının favori listesine ekler.
      operationId: addFavorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adId
              properties:
                adId:
                  type: string
                  format: uuid
                  example: "a1b2c3d4-e5f6-7890-1234-56789abcdef0"
      responses:
        '201':
          description: İlan favorilere başarıyla eklendi
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /favorites/{adId}:
    delete:
      tags:
        - favorites
      summary: 8. İlanı Favorilerden Çıkarma
      description: İlanı kullanıcının favori listesinden siler.
      operationId: removeFavorite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AdIdParam'
      responses:
        '204':
          description: İlan favorilerden başarıyla çıkarıldı
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}:
    put:
      tags:
        - users
      summary: 9. Profil Bilgilerini Güncelleme
      description: Kullanıcının kişisel bilgilerini veya şifresini günceller.
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - users
      summary: 10. Kullanıcı Hesabını Silme
      description: Kullanıcıyı ve ona ait tüm verileri sistemden kalıcı olarak siler.
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204':
          description: Hesap başarıyla silindi
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token ile kimlik doğrulama

  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      description: Kullanıcı ID'si
      schema:
        type: string
        format: uuid
        example: "123e4567-e89b-12d3-a456-426614174000"
        
    AdIdParam:
      name: adId
      in: path
      required: true
      description: İlan ID'si
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-1234-56789abcdef0"
        
    PageParam:
      name: page
      in: query
      description: Sayfa numarası
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1
        
    LimitParam:
      name: limit
      in: query
      description: Sayfa başına ilan sayısı
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
        example: 20

  schemas:
    User:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Kullanıcı benzersiz kimliği
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          format: email
          description: Kullanıcı email adresi
          example: "ogrenci@sdu.edu.tr"
        firstName:
          type: string
          description: Ad
          example: "Mehmet"
        lastName:
          type: string
          description: Soyad
          example: "Yılmaz"
        phone:
          type: string
          description: Telefon numarası
          example: "+905551234567"
        createdAt:
          type: string
          format: date-time
          description: Kayıt tarihi
          example: "2024-03-09T10:30:00Z"

    UserRegistration:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          example: "ogrenci@sdu.edu.tr"
        password:
          type: string
          format: password
          minLength: 6
          example: "GuvenliSifre32!"
        firstName:
          type: string
          minLength: 2
          example: "Mehmet"
        lastName:
          type: string
          minLength: 2
          example: "Yılmaz"
        phone:
          type: string
          example: "+905551234567"

    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
          example: "Mehmet Can"
        lastName:
          type: string
          minLength: 2
          example: "Yılmaz"
        phone:
          type: string
          example: "+905559876543"
        password:
          type: string
          format: password
          minLength: 6
          example: "YeniSifre32!"

    LoginCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "ogrenci@sdu.edu.tr"
        password:
          type: string
          format: password
          example: "GuvenliSifre32!"

    AuthToken:
      type: object
      required:
        - token
        - expiresIn
        - user
      properties:
        token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expiresIn:
          type: integer
          description: Token geçerlilik süresi (saniye)
          example: 86400
        user:
          $ref: '#/components/schemas/User'

    Ad:
      type: object
      required:
        - id
        - title
        - price
        - mahalle
        - userId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-1234-56789abcdef0"
        userId:
          type: string
          format: uuid
          description: İlanı veren kullanıcının ID'si
          example: "123e4567-e89b-12d3-a456-426614174000"
        title:
          type: string
          description: İlan başlığı
          example: "Sahibinden Temiz Yamaha MT-07"
        description:
          type: string
          description: İlan açıklaması
          example: "2020 model, kazasız, tüm bakımları serviste yapıldı. SDU öğrencisinden satılık."
        price:
          type: number
          format: float
          description: İlan fiyatı (TL)
          example: 245000.00
        mahalle:
          type: string
          description: Isparta içi mahalle
          example: "Çünür"
        createdAt:
          type: string
          format: date-time
          description: İlan verilme tarihi
          example: "2024-03-09T14:45:00Z"
        updatedAt:
          type: string
          format: date-time
          description: İlan güncellenme tarihi
          example: "2024-03-09T14:45:00Z"

    AdCreate:
      type: object
      required:
        - title
        - price
        - mahalle
      properties:
        title:
          type: string
          minLength: 5
        description:
          type: string
        price:
          type: number
          format: float
          minimum: 0
        mahalle:
          type: string

    AdUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 5
          example: "Acil Satılık Yamaha MT-07"
        description:
          type: string
          example: "Fiyat düştü, acil nakit ihtiyacından satılık."
        price:
          type: number
          format: float
          minimum: 0
          example: 235000.00
        mahalle:
          type: string
          example: "Çünür"

    AdList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ad'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Mevcut sayfa
          example: 1
        limit:
          type: integer
          description: Sayfa başına kayıt
          example: 20
        totalPages:
          type: integer
          description: Toplam sayfa sayısı
          example: 3
        totalItems:
          type: integer
          description: Toplam kayıt sayısı
          example: 45

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Hata kodu
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Hata mesajı
          example: "İstek parametreleri geçersiz."
        details:
          type: array
          description: Detaylı hata bilgileri
          items:
            type: object
            properties:
              field:
                type: string
                example: "price"
              message:
                type: string
                example: "Fiyat 0'dan büyük olmalıdır."

  responses:
    BadRequest:
      description: Geçersiz istek (Eksik veya hatalı parametre)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "BAD_REQUEST"
            message: "Gerekli alanlar eksik veya format hatalı."
            
    Unauthorized:
      description: Yetkisiz erişim (Token eksik veya geçersiz)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "UNAUTHORIZED"
            message: "Bu işlem için oturum açmanız gerekmektedir."
            
    Forbidden:
      description: Erişim reddedildi (Bu işlem için yetki yok)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "FORBIDDEN"
            message: "Başka bir kullanıcının ilanını silemezsiniz/güncelleyemezsiniz."
            
    NotFound:
      description: İstenen kaynak bulunamadı
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "NOT_FOUND"
            message: "İlan veya kullanıcı bulunamadı."
