# 32Bit Garage — Render API (web/backend)
# Vercel icin web/frontend kullanilir — bu dosya SADECE API icindir.

services:
  - type: web
    name: arabam-benzeri-site
    runtime: node
    plan: free
    rootDir: web/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
